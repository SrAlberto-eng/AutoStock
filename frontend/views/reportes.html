<!--
  Vista: Reportes
  Fuente React: app/reportes/page.tsx
  Descripción: Historial de movimientos de inventario con filtros por tipo,
               rango de fechas y búsqueda de producto/usuario. Permite
               exportar a CSV.
  Scripts requeridos: toast.js, layout.js, reportes.js
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoStock — Reportes</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/animations.css">
</head>
<body>

<div id="app-layout">
  <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

  <!-- SIDEBAR -->
  <aside id="app-sidebar" role="navigation" aria-label="Navegación principal">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
      <span class="sidebar-logo-text">AutoStock</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Colapsar menú">
        <span id="sidebar-toggle-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg></span>
        <span id="sidebar-toggle-label">Colapsar</span>
      </button>
    </div>
  </aside>
  <script>try{var s=JSON.parse(localStorage.getItem('v1_ui_sidebar'));if(s&&s.collapsed)document.getElementById('app-sidebar').classList.add('collapsed');}catch(e){}</script>

  <!-- MAIN -->
  <div id="main-content">
    <header id="top-bar" role="banner">
      <div class="top-bar-left">
        <button id="mobile-menu-btn" class="btn-menu" aria-label="Abrir menú" style="display:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
        <h1 class="top-bar-title">Reportes</h1>
      </div>
      <div class="top-bar-right">
        <div class="dropdown-wrapper" style="position:relative;">
          <button id="profile-trigger" class="profile-trigger" aria-label="Menú de perfil" aria-haspopup="true" aria-expanded="false"><div class="avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></button>
          <div id="profile-dropdown" class="dropdown-menu profile-menu hidden" role="menu">
            <div class="profile-menu-header"><div class="avatar avatar-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="font-medium text-sm"><!-- Admin Usuario --></div><div class="text-xs text-muted"><!-- admin@empresa.com --></div></div></div>
            <hr class="separator">
            <button class="dropdown-item" role="menuitem" onclick="modalManager.open('modal-profile')">Mi Perfil</button>
            <hr class="separator">
            <button class="dropdown-item dropdown-item-danger" role="menuitem" onclick="window.location.href='login.html'">Cerrar Sesión</button>
          </div>
        </div>
      </div>
    </header>

    <main class="page-body">

      <!-- Summary cards -->
      <div class="summary-grid" style="margin-bottom:24px;">
        <div class="stat-card">
          <div class="stat-card-left">
            <div class="stat-card-icon-wrapper stat-icon--green">
              <svg class="stat-card-icon" viewBox="0 0 24 24" fill="none" stroke="#6BE89A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 17V3"/><path d="m6 11 6 6 6-6"/><path d="M19 21H5"/></svg>
            </div>
            <p class="stat-label">Entradas del período</p>
          </div>
          <p class="stat-value">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-left">
            <div class="stat-card-icon-wrapper stat-icon--blue">
              <svg class="stat-card-icon" viewBox="0 0 24 24" fill="none" stroke="#5AA9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v14"/><path d="m19 9-7-7-7 7"/><path d="M5 21h14"/></svg>
            </div>
            <p class="stat-label">Salidas del período</p>
          </div>
          <p class="stat-value">—</p>
        </div>
        <div class="stat-card">
          <div class="stat-card-left">
            <div class="stat-card-icon-wrapper" style="background-color:rgba(255,184,107,0.12);">
              <svg class="stat-card-icon" viewBox="0 0 24 24" fill="none" stroke="#FFB86B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="m19 6-.867 12.142A2 2 0 0 1 16.138 20H7.862a2 2 0 0 1-1.995-1.858L5 6"/></svg>
            </div>
            <p class="stat-label">Mermas del período</p>
          </div>
          <p class="stat-value">—</p>
        </div>
      </div>

      <!-- Filters row -->
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
        <!-- Search -->
        <div class="input-search-wrapper" style="position:relative; flex:1; min-width:200px; max-width:360px;">
          <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--color-text-muted); pointer-events:none;" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
          <input id="reportes-search" type="search" class="input" placeholder="Buscar producto o usuario..." style="padding-left:34px;" autocomplete="off" aria-label="Buscar en reportes">
        </div>

        <!-- Type chips -->
        <div role="group" aria-label="Tipo de movimiento" style="display:flex; gap:8px;">
          <button class="filter-chip active" data-type="" aria-pressed="true">Todos</button>
          <button class="filter-chip" data-type="entrada" aria-pressed="false">Entradas</button>
          <button class="filter-chip" data-type="salida" aria-pressed="false">Salidas</button>
          <button class="filter-chip" data-type="merma" aria-pressed="false">Mermas</button>
        </div>

        <!-- Date range -->
        <div style="display:flex; align-items:center; gap:8px;">
          <input type="date" id="date-from" class="input" style="width:150px;" aria-label="Desde">
          <span class="text-sm text-muted">—</span>
          <input type="date" id="date-to" class="input" style="width:150px;" aria-label="Hasta">
        </div>

        <!-- Export CSV -->
        <button class="btn btn-outline btn-sm" onclick="exportCSV()" style="margin-left:auto;" aria-label="Exportar CSV">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Exportar CSV
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="text-left">Fecha y hora</th>
              <th class="text-left">Tipo</th>
              <th class="text-left">Producto</th>
              <th class="text-center">Cantidad</th>
              <th class="text-center">Usuario</th>
              <th>Área/Destino</th>
              <th class="text-left">Notas</th>
            </tr>
          </thead>
          <tbody id="reportes-tbody"></tbody>
        </table>
        <p id="reportes-empty" class="empty-state" style="display:none; padding:32px; text-align:center; color:#A6A6A6;">No se encontraron movimientos con los filtros aplicados.</p>
      </div>

    </main>
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<div id="toast-container"></div>
<script src="../scripts/sanitizers.js"></script>
<script src="../scripts/storage-manager.js"></script>
<script src="../scripts/api-client.js"></script>
<script src="../scripts/services.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/layout.js"></script>
<script src="../scripts/toast.js"></script>
<script src="../scripts/modals.js"></script>
<script src="../scripts/filter-engine.js"></script>
<script src="../scripts/filter-chips.js"></script>
<script src="../scripts/reportes.js"></script>
</body>
</html>
