<!--
  Vista: Usuarios
  Fuente React: app/usuarios/page.tsx
  Descripción: Tabla de usuarios del sistema con filtros por nombre,
               rol y área. Permite crear y editar usuarios mediante
               el UserModal.
  Modales incluidos: modal-user (crear/editar)
  Scripts requeridos: toast.js, layout.js, modals.js, usuarios.js
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoStock — Usuarios</title>
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/animations.css">
</head>
<body>

<div id="app-layout">
  <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

  <!-- SIDEBAR -->
  <aside id="app-sidebar" role="navigation" aria-label="Navegación principal">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></div>
      <span class="sidebar-logo-text">AutoStock</span>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Colapsar menú">
        <span id="sidebar-toggle-icon" aria-hidden="true"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/><path d="m16 15-3-3 3-3"/></svg></span>
        <span id="sidebar-toggle-label">Colapsar</span>
      </button>
    </div>
  </aside>
  <script>try{var s=JSON.parse(localStorage.getItem('v1_ui_sidebar'));if(s&&s.collapsed)document.getElementById('app-sidebar').classList.add('collapsed');}catch(e){}</script>

  <!-- MAIN -->
  <div id="main-content">
    <header id="top-bar" role="banner">
      <div class="top-bar-left">
        <button id="mobile-menu-btn" class="btn-menu" aria-label="Abrir menú" style="display:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg></button>
        <h1 class="top-bar-title">Usuarios</h1>
      </div>
      <div class="top-bar-right">
        <div class="dropdown-wrapper" style="position:relative;">
          <button id="profile-trigger" class="profile-trigger" aria-label="Menú de perfil" aria-haspopup="true" aria-expanded="false"><div class="avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div></button>
          <div id="profile-dropdown" class="dropdown-menu profile-menu hidden" role="menu">
            <div class="profile-menu-header"><div class="avatar avatar-lg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="font-medium text-sm"><!-- Admin Usuario --></div><div class="text-xs text-muted"><!-- admin@empresa.com --></div></div></div>
            <hr class="separator">
            <button class="dropdown-item" role="menuitem" onclick="modalManager.open('modal-profile')">Mi Perfil</button>
            <hr class="separator">
            <button class="dropdown-item dropdown-item-danger" role="menuitem" onclick="window.location.href='login.html'">Cerrar Sesión</button>
          </div>
        </div>
      </div>
    </header>

    <main class="page-body">

<!-- Header acciones -->
<div style="display:flex; justify-content:flex-end; margin-bottom:12px;">
  <button id="btn-new-user" class="btn btn-primary" onclick="openUserModal()" aria-label="Crear usuario">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Nuevo usuario
  </button>
</div>

      <!-- Filtros -->
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
        <div style="position:relative; flex:1; min-width:240px;">
          <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--color-text-muted); pointer-events:none;" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
          </span>
          <input id="usuarios-search" type="search" class="input" placeholder="Buscar por nombre o correo..." style="padding-left:34px;" autocomplete="off" aria-label="Buscar usuario">
        </div>

        <select id="filter-role" class="select-native" aria-label="Filtrar por rol" style="width:220px;">
          <option value="">Todos los roles</option>
        </select>

        <select id="filter-area-u" class="select-native" aria-label="Filtrar por área" style="width:220px;">
          <option value="">Todas las áreas</option>
        </select>

        <label id="label-show-inactive-users" class="text-sm" style="display:none; align-items:center; gap:6px; cursor:pointer; color:#A6A6A6;">
          <input type="checkbox" id="chk-show-inactive-users"> Mostrar inactivos
        </label>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="text-left">Nombre</th>
              <th class="text-left">Correo</th>
              <th>Rol</th>
              <th class="text-left">Área</th>
              <th>Estado</th>
              <th style="width:100px;">Activo</th>
              <th style="width:120px;"></th>
            </tr>
          </thead>
          <tbody id="usuarios-tbody"></tbody>
        </table>
        <p id="usuarios-empty" class="empty-state" style="display:none; padding:32px; text-align:center; color:#A6A6A6;">No se encontraron usuarios con los filtros aplicados.</p>
      </div>

    </main>
  </div><!-- /main-content -->
</div><!-- /app-layout -->

<!-- ══════════════════════════════════════════════════════
     MODAL: Usuario (crear / editar)
     ══════════════════════════════════════════════════════ -->
<div id="modal-user" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-user-title" data-state="closed">
  <div class="modal-dialog modal-lg modal-panel">
    <div class="modal-header">
      <h2 id="modal-user-title" class="modal-title">Nuevo usuario</h2>
      <p class="modal-description" id="modal-user-desc">Completa los datos del nuevo usuario.</p>
    </div>
    <div class="modal-body">
      <input type="hidden" id="user-editing-id" value="">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="field"><label class="field-label" for="user-name">Nombre de usuario <span style="color:#FF6B6B;">*</span></label><input id="user-name" class="input" type="text" placeholder=""></div>
        <div class="field"><label class="field-label" for="user-email">Correo electrónico <span style="color:#FF6B6B;">*</span></label><input id="user-email" class="input" type="email" placeholder=""></div>
        <div class="field">
          <label class="field-label" for="user-role">Rol <span style="color:#FF6B6B;">*</span></label>
          <select id="user-role" class="select-native" aria-label="Seleccionar rol">
            <option value="">Seleccionar rol...</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label" for="user-area">Área</label>
          <select id="user-area" class="select-native" aria-label="Seleccionar área" disabled="true">
            <option value="">Seleccionar área...</option>
          </select>
        </div>
      </div>

      <!-- Temp password section (only visible for new users) -->
      <div id="user-password-section" style="margin-top:16px;">
        <div class="field"><label class="field-label" for="user-temp-pass">Contraseña temporal <span style="color:#FF6B6B;">*</span></label><input id="user-temp-pass" class="input" type="password" placeholder="••••••••"></div>
        <p class="text-xs text-muted" style="margin-top:4px;">El usuario deberá cambiar su contraseña al iniciar sesión por primera vez.</p>
      </div>

    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" data-modal-close="modal-user" onclick="clearUserModal()">Cancelar</button>
      <button type="button" class="btn btn-primary" onclick="saveUser()">Guardar usuario</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../scripts/sanitizers.js"></script>
<script src="../scripts/storage-manager.js"></script>
<script src="../scripts/api-client.js"></script>
<script src="../scripts/services.js"></script>
<script src="../scripts/store.js"></script>
<script src="../scripts/layout.js"></script>
<script src="../scripts/toast.js"></script>
<script src="../scripts/modals.js"></script>
<script src="../scripts/filter-engine.js"></script>
<script src="../scripts/usuarios.js"></script>
</body>
</html>
